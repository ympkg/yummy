name: Dev Release

on:
  push:
    branches: [dev]
    paths:
      - 'Cargo.toml'
      - 'src/**'
      - 'ym-agent/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: dev-release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Get base version from Cargo.toml
        id: version
        run: |
          BASE=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION="${BASE}-dev.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Dev release version: $VERSION"

  build-agent:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build ym-agent.jar
        run: |
          mkdir -p ym-agent/out
          javac -d ym-agent/out ym-agent/src/main/java/sh/yummy/agent/*.java
          jar cfm ym-agent/ym-agent.jar ym-agent/src/main/resources/META-INF/MANIFEST.MF -C ym-agent/out .

      - uses: actions/upload-artifact@v6
        with:
          name: ym-agent
          path: ym-agent/ym-agent.jar

  build-binary:
    needs: get-version
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for aarch64
        if: matrix.cross
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ym-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ym

      - name: Upload binary (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ym-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ym.exe

  release:
    name: Create Pre-Release
    needs: [get-version, build-agent, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Package archives
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"

          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-gnu; do
            dir="ym-${VERSION}-${target}"
            mkdir "$dir"
            cp "artifacts/ym-${target}/ym" "$dir/"
            cp "artifacts/ym-agent/ym-agent.jar" "$dir/"
            chmod +x "$dir/ym"
            tar czf "${dir}.tar.gz" "$dir"
          done

          target="x86_64-pc-windows-msvc"
          dir="ym-${VERSION}-${target}"
          mkdir "$dir"
          cp "artifacts/ym-${target}/ym.exe" "$dir/"
          cp "artifacts/ym-agent/ym-agent.jar" "$dir/"
          zip -r "${dir}.zip" "$dir"

      - name: Generate checksums
        run: |
          sha256sum ym-*.tar.gz ym-*.zip > SHA256SUMS.txt

      - name: Delete existing pre-release tag (if any)
        uses: actions/github-script@v8
        with:
          script: |
            const tag = 'v${{ needs.get-version.outputs.version }}';
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (e) {
              // Tag doesn't exist yet
            }

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: v${{ needs.get-version.outputs.version }}
          prerelease: true
          files: |
            ym-*.tar.gz
            ym-*.zip
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Publish Docker Dev Image
    needs: [get-version, build-agent, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare Docker context
        run: |
          cp artifacts/ym-x86_64-unknown-linux-musl/ym .
          cp artifacts/ym-agent/ym-agent.jar .
          chmod +x ym

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ympkg/yummy:dev
            ghcr.io/ympkg/yummy:dev
