name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'src/**'
      - 'ym-agent/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.current.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: check
        run: |
          # workflow_dispatch always proceeds
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger: proceeding with release"
            exit 0
          fi
          OLD_VERSION=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "")
          NEW_VERSION=${{ steps.current.outputs.version }}
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD_VERSION → $NEW_VERSION"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $NEW_VERSION"
          fi

  create-tag:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create and push tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          if git ls-remote --tags origin "v${VERSION}" | grep -q "v${VERSION}"; then
            echo "Tag v${VERSION} already exists, skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-agent:
    needs: [check-version, create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Build ym-agent.jar
        run: |
          mkdir -p ym-agent/out
          javac -d ym-agent/out ym-agent/src/main/java/sh/yummy/agent/*.java
          jar cfm ym-agent/ym-agent.jar ym-agent/src/main/resources/META-INF/MANIFEST.MF -C ym-agent/out .

      - uses: actions/upload-artifact@v6
        with:
          name: ym-agent
          path: ym-agent/ym-agent.jar

  build-binary:
    needs: [check-version, create-tag]
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for aarch64
        if: matrix.cross
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ym-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ym

      - name: Upload binary (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ym-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ym.exe

  release:
    name: Create Release
    needs: [check-version, build-agent, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Package archives
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-gnu; do
            dir="ym-${VERSION}-${target}"
            mkdir "$dir"
            cp "artifacts/ym-${target}/ym" "$dir/"
            cp "artifacts/ym-agent/ym-agent.jar" "$dir/"
            cp README.md "$dir/" 2>/dev/null || true
            chmod +x "$dir/ym"
            tar czf "${dir}.tar.gz" "$dir"
          done

          # Windows zip
          target="x86_64-pc-windows-msvc"
          dir="ym-${VERSION}-${target}"
          mkdir "$dir"
          cp "artifacts/ym-${target}/ym.exe" "$dir/"
          cp "artifacts/ym-agent/ym-agent.jar" "$dir/"
          cp README.md "$dir/" 2>/dev/null || true
          zip -r "${dir}.zip" "$dir"

      - name: Generate checksums
        run: |
          sha256sum ym-*.tar.gz ym-*.zip > SHA256SUMS.txt
          cp artifacts/ym-agent/ym-agent.jar .
          sha256sum ym-agent.jar >> SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            ym-*.tar.gz
            ym-*.zip
            ym-agent.jar
            SHA256SUMS.txt

  publish-crate:
    name: Publish to crates.io
    needs: [check-version, create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.YUMMY_CRATES_TOKEN }}

  publish-docker:
    name: Publish Docker Image
    needs: [check-version, build-agent, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare Docker context
        run: |
          cp artifacts/ym-x86_64-unknown-linux-musl/ym .
          cp artifacts/ym-agent/ym-agent.jar .
          chmod +x ym

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ympkg/yummy:latest
            ympkg/yummy:${{ needs.check-version.outputs.version }}
            ghcr.io/ympkg/yummy:latest
            ghcr.io/ympkg/yummy:${{ needs.check-version.outputs.version }}
